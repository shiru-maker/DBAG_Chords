<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Team Chords</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-shape shape-one"></div>
    <div class="background-shape shape-two"></div>
    <div class="floating-notes" aria-hidden="true">
      <span class="note note-1">♪</span>
      <span class="note note-2">♫</span>
      <span class="note note-3">♬</span>
      <span class="note note-4">♪</span>
      <span class="note note-5">♫</span>
      <span class="note note-6">♩</span>
      <span class="note note-7">♬</span>
      <span class="note note-8">♪</span>
    </div>
    <div class="water-layer" aria-hidden="true">
      <span class="fish fish-1"></span>
      <span class="fish fish-2"></span>
      <span class="fish fish-3"></span>
      <span class="fish fish-4"></span>
      <span class="fish fish-5"></span>
      <span class="turtle-shadow"></span>
      <span class="sea-grass sea-grass-1"></span>
      <span class="sea-grass sea-grass-2"></span>
      <span class="sea-grass sea-grass-3"></span>
      <span class="coral coral-1"></span>
      <span class="coral coral-2"></span>
    </div>

    <main class="app-shell">
      <section class="main-column">
        <section class="controls">
          <input
            type="text"
            id="searchInput"
            placeholder="Search song"
            aria-label="Search chords"
            autocomplete="off"
          />
        </section>

        <header class="hero">
          <div class="hero-text">
            <div class="hero-title">
              <div>
                <h1>Music Team Chords</h1>
                <p class="subtitle">
                  Psalms 7:17
                </p>
              </div>
            </div>
          </div>
          <div class="hero-actions">
            <button class="btn btn-primary" id="newChordBtn" type="button">+ New Chord</button>
          </div>
        </header>

        <section class="list-wrap">
          <div class="list-header">
            <h2>Chord/Song List: </h2>
            <span id="countBadge">0 songs</span>
          </div>
          <div id="chordList" class="chord-list"></div>
        </section>
      </section>

      <aside class="schedule-panel">
        <div class="list-header schedule-list-header">
          <h2>Schedule:</h2>
        </div>
        <div class="schedule-actions">
          <button
            class="btn btn-primary btn-play"
            id="schedulePlayBtn"
            type="button"
            aria-label="Play music flow"
          >
            <span class="play-icon" aria-hidden="true"></span>
            <span class="play-label">Play</span>
          </button>
        </div>
        <ul id="scheduleList" class="schedule-list"></ul>
      </aside>
    </main>

    <div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal">
        <div class="modal-head">
          <h3 id="modalTitle">Add Chord</h3>
          <button id="closeModalBtn" class="icon-btn" aria-label="Close form">&times;</button>
        </div>

        <form id="chordForm" autocomplete="off">
          <input type="hidden" id="chordId" />

          <label for="title">Song Title</label>
          <input type="text" id="title" required placeholder="e.g. Amazing Grace" autocomplete="off" />

          <label for="artist">Artist / Team</label>
          <input type="text" id="artist" placeholder="e.g. Music Team" autocomplete="off" />

          <div class="row key-lead-row">
            <div>
              <label for="keySelect" class="sr-only">Key</label>
              <select id="keySelect" aria-label="Key dropdown" autocomplete="off">
                <option value="">Select key</option>
                <option value="C">C</option>
                <option value="C#">C#</option>
                <option value="Db">Db</option>
                <option value="D">D</option>
                <option value="D#">D#</option>
                <option value="Eb">Eb</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="F#">F#</option>
                <option value="Gb">Gb</option>
                <option value="G">G</option>
                <option value="G#">G#</option>
                <option value="Ab">Ab</option>
                <option value="A">A</option>
                <option value="A#">A#</option>
                <option value="Bb">Bb</option>
                <option value="B">B</option>
              </select>
            </div>
            <div>
              <label for="songLeadName" class="sr-only">Songlead</label>
              <input type="text" id="songLeadName" placeholder="Songlead" autocomplete="off" />
            </div>
          </div>

          <div class="row">
            <div>
              <label for="key">Key</label>
              <input type="text" id="key" placeholder="e.g. G" autocomplete="off" />
            </div>
            <div>
              <label for="bpm">BPM</label>
              <input type="number" id="bpm" min="20" max="260" placeholder="e.g. 72" autocomplete="off" />
            </div>
          </div>

          <label for="tags">Tags (comma-separated)</label>
          <input type="text" id="tags" placeholder="worship, acoustic, sunday" autocomplete="off" />

          <label for="chords">Chords / Lyrics</label>
          <textarea
            id="chords"
            rows="9"
            required
            placeholder="Type your chord progression or full chart here..."
            autocomplete="off"
          ></textarea>

          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
            <button type="submit" class="btn btn-primary" id="saveBtn">Save Chord</button>
          </div>
        </form>
      </div>
    </div>

    <div id="viewOverlay" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal modal-view">
        <div class="modal-head">
          <div>
            <h3 id="viewTitle">Chord Details</h3>
            <p id="viewMeta" class="view-meta"></p>
          </div>
          <button id="closeViewBtn" class="icon-btn" aria-label="Close preview">&times;</button>
        </div>
        <div class="view-actions">
          <div class="pill key-pill" id="viewKeyPill">Key: -</div>
          <div class="pill songlead-pill" id="viewSongLeadPill">Songlead: -</div>
          <div class="transpose-group">
            <button class="btn btn-small btn-ghost" id="viewTransposeDown" type="button">-</button>
            <span class="transpose-label">Transpose</span>
            <button class="btn btn-small btn-ghost" id="viewTransposeUp" type="button">+</button>
          </div>
          <button class="btn btn-small btn-ghost" id="viewEditBtn" type="button">Edit</button>
        </div>
        <div id="viewTags" class="view-tags"></div>
        <pre id="viewContent" class="view-content"></pre>
      </div>
    </div>

    <div id="passwordOverlay" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal password-modal">
        <div class="modal-head">
          <h3>Enter Password</h3>
          <button id="closePasswordBtn" class="icon-btn" aria-label="Close password">&times;</button>
        </div>
        <div class="password-body">
          <label for="editPassword">Password</label>
          <input
            type="password"
            id="editPassword"
            placeholder="Enter password"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            inputmode="text"
          />
          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="cancelPasswordBtn">Cancel</button>
            <button type="button" class="btn btn-primary" id="confirmPasswordBtn">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <template id="chordCardTemplate">
      <article class="chord-card">
        <div class="card-head">
          <div>
            <div class="card-title-btn">
              <button class="card-title-main" type="button">
                <div class="card-title-text">
                  <h3 class="card-title"></h3>
                  <p class="card-artist"></p>
                </div>
              </button>
              <button class="card-add-btn" type="button" aria-label="Add to playlist">Add</button>
            </div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn btn-small btn-danger delete-btn" type="button" aria-label="Delete">
            <img class="delete-icon" src="trash.png" alt="" aria-hidden="true" />
          </button>
          <button
            class="btn btn-small btn-confirm delete-confirm-btn hidden"
            type="button"
            aria-label="Confirm delete"
            title="Confirm delete"
          >
            &#10003;
          </button>
          <button
            class="btn btn-small btn-cancel delete-cancel-btn hidden"
            type="button"
            aria-label="Cancel delete"
            title="Cancel"
          >
            &#10005;
          </button>
        </div>
      </article>
    </template>

    <script type="module" src="script.js"></script>
  </body>
</html>
